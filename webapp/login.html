<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Grid – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0f1a;
      --surface: #111827;
      --border: #1e2d40;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
      top: -200px; right: -200px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, transparent 70%);
      bottom: -150px; left: -150px;
      pointer-events: none;
    }

    /* Grid lines background */
    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(30,45,64,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,45,64,0.4) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1.welcome {
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
    }

    .login-error {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 20px;
    }
    .login-error.visible { display: block; }

    button#login-btn {
      width: 100%;
      background: var(--accent);
      color: #0a0f1a;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    button#login-btn:hover { opacity: 0.9; }
    button#login-btn:active { transform: scale(0.99); }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
      font-family: 'Space Mono', monospace;
    }
    .hint span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">SmartGrid / Optimizer</div>
    </div>

    <h1 class="welcome">Welcome back</h1>
    <p class="subtitle">Sign in to your Energy Monitor</p>

    <div class="login-error" id="login-error-msg">
      Invalid credentials. Please try again.
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>

    <button id="login-btn">Sign In</button>

    <p class="hint">Demo credentials: <span>admin</span> / <span>password123</span></p>
  </div>

  <script>
    const VALID_USER = 'admin';
    const VALID_PASS = 'password123';

    document.getElementById('login-btn').addEventListener('click', () => {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const errEl = document.getElementById('login-error-msg');

      if (user === VALID_USER && pass === VALID_PASS) {
        errEl.classList.remove('visible');
        errEl.style.display = 'none';
        window.location.href = '/dashboard';
      } else {
        errEl.classList.add('visible');
        errEl.style.display = 'block';
      }
    });

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
  </script>
</body>
</html>
